# Production override — use pre-built images instead of local builds.
# Usage: docker compose -f compose.yaml -f compose.prod.yaml up -d
#
# Pull images first:
#   docker compose -f compose.yaml -f compose.prod.yaml pull
#
# Pin a specific version:
#   ARKLOOP_VERSION=v0.5.0 docker compose -f compose.yaml -f compose.prod.yaml up -d
#
# Image prefix:
#   ARKLOOP_IMAGE_REPOSITORY=ghcr.io/jzefan/arkloop
# Service images resolve to ${ARKLOOP_IMAGE_REPOSITORY}-{service}:${ARKLOOP_VERSION:-latest}.

services:
  migrate:
    image: ${ARKLOOP_IMAGE_REPOSITORY:-ghcr.io/jzefan/arkloop}-api:${ARKLOOP_VERSION:-latest}

  api:
    image: ${ARKLOOP_IMAGE_REPOSITORY:-ghcr.io/jzefan/arkloop}-api:${ARKLOOP_VERSION:-latest}

  gateway:
    image: ${ARKLOOP_IMAGE_REPOSITORY:-ghcr.io/jzefan/arkloop}-gateway:${ARKLOOP_VERSION:-latest}

  worker:
    image: ${ARKLOOP_IMAGE_REPOSITORY:-ghcr.io/jzefan/arkloop}-worker:${ARKLOOP_VERSION:-latest}

  sandbox:
    image: ${ARKLOOP_IMAGE_REPOSITORY:-ghcr.io/jzefan/arkloop}-sandbox:${ARKLOOP_VERSION:-latest}

  sandbox-docker:
    image: ${ARKLOOP_IMAGE_REPOSITORY:-ghcr.io/jzefan/arkloop}-sandbox:${ARKLOOP_VERSION:-latest}

  console:
    image: ${ARKLOOP_IMAGE_REPOSITORY:-ghcr.io/jzefan/arkloop}-console:${ARKLOOP_VERSION:-latest}

  console-lite:
    image: ${ARKLOOP_IMAGE_REPOSITORY:-ghcr.io/jzefan/arkloop}-console-lite:${ARKLOOP_VERSION:-latest}

  bridge:
    image: ${ARKLOOP_IMAGE_REPOSITORY:-ghcr.io/jzefan/arkloop}-bridge:${ARKLOOP_VERSION:-latest}
