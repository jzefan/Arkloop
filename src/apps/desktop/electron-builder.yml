appId: com.arkloop.desktop
productName: Arkloop
copyright: Copyright (c) Arkloop

directories:
  output: release

files:
  - dist/**/*
  - resources/**/*

extraResources:
  - from: ../../services/desktop/bin/
    to: sidecar
    filter:
      - "**/*"
  - from: ../web/dist/
    to: renderer
    filter:
      - "**/*"

mac:
  category: public.app-category.developer-tools
  target:
    - target: dmg
      arch:
        - arm64
        - x64
  icon: resources/icon.icns

linux:
  category: Development
  target:
    - AppImage
    - deb
  icon: resources/icon.png

win:
  target:
    - nsis
  icon: resources/icon.ico

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
