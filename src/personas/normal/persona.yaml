id: normal
version: "1"
title: Normal
description: 通用对话模式，支持工具调用、多轮推理和深度分析。
soul_file: soul.md
user_selectable: false
selector_name: Normal
selector_order: 1
core_tools:
    - timeline_title
    - ask_user
    - read
    - todo_write
    - web_search
    - web_fetch
    - python_execute
    - exec_command
    - document_write
    - memory_search
budgets:
    reasoning_iterations: 99999
    temperature: 1
title_summarize:
    max_tokens: 512
    prompt: Phrase the title as the user's task or question (e.g. 做个网页、改这段代码). If the user's message is mainly Chinese, keep it under 10 Chinese characters; otherwise keep it under 6 words. Avoid naming only the business/theme of the thing they want produced.
reasoning_mode: auto
prompt_cache_control: none
executor_type: agent.simple
allow_platform_delegation: true
heartbeat:
  enabled: true
