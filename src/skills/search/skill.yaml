id: search
version: "1"
title: Search
description: 联网搜索模式，自动检索网络信息并综合输出。
tool_denylist:
  - spawn_agent
budgets:
  max_iterations: 100
  max_output_tokens: 8192
title_summarize:
  prompt: "Keep it under 5 Chinese characters. Extract the search intent."
  max_tokens: 10
executor_type: agent.lua
executor_config:
  script: |
    local query = context.get("last_user_message")
    if not query or query == "" then
      context.set_output("No query provided.")
      return
    end

    local system_prompt = context.get("system_prompt")
    local messages_json = context.get("messages")

    local messages = {}
    if messages_json and messages_json ~= "" then
      local ok, parsed = pcall(json.decode, messages_json)
      if ok and parsed then
        messages = parsed
      end
    end

    -- 意图判断：是否需要联网搜索
    local INTENT_PROMPT = "Determine if this query requires web search to answer properly.\n"
      .. 'Return ONLY valid JSON: {"need_search":true} or {"need_search":false}\n'
      .. "need_search=true: factual questions, current events, news, real-time data, product info, anything requiring up-to-date web information.\n"
      .. "need_search=false: code execution, calculations, creative writing, translation, general conversation, explicit tool usage requests.\n"

    local raw_intent, _ = agent.generate(INTENT_PROMPT, "User query: " .. query, { max_tokens = 64 })
    local need_search = true
    if raw_intent and raw_intent ~= "" then
      local ok, parsed = pcall(json.decode, raw_intent)
      if ok and parsed and parsed.need_search == false then
        need_search = false
      end
    end

    if not need_search then
      agent.stream(system_prompt, messages, { max_tokens = 8192 })
      return
    end

    local DECOMPOSE_PROMPT = "You decompose user queries into web search keywords.\n"
      .. "Given a user query, return a JSON object:\n"
      .. '- "interpretation": one-sentence summary of the query (in the user\'s language)\n'
      .. '- "queries": array of 2-4 concise search keyword phrases\n'
      .. "Return ONLY valid JSON.\n"
      .. 'Example: {"interpretation":"Comparing React and Vue in 2024","queries":["React vs Vue 2024","React advantages 2024","Vue advantages 2024"]}'

    local ASSESS_PROMPT = "Given a user query and search results summary, decide if additional search is needed.\n"
      .. 'Return ONLY valid JSON: {"sufficient":true} or {"sufficient":false,"queries":["query1","query2"]}\n'
      .. "Be conservative - only request more if results are clearly insufficient."

    local max_rounds = 2
    local all_sources = {}
    local round = 0
    local continue_search = true

    while continue_search and round < max_rounds do
      round = round + 1

      -- 1. 分解查询
      local decompose_input = "User query: " .. query
      if round > 1 then
        decompose_input = decompose_input .. "\nExisting results: " .. tostring(#all_sources) .. " sources."
      end

      local raw_plan, gen_err = agent.generate(DECOMPOSE_PROMPT, decompose_input, { max_tokens = 512 })
      local plan
      if gen_err or not raw_plan or raw_plan == "" then
        plan = { interpretation = query, queries = { query } }
      else
        local ok, parsed = pcall(json.decode, raw_plan)
        if ok and parsed and parsed.queries and #parsed.queries > 0 then
          plan = parsed
        else
          plan = { interpretation = query, queries = { query } }
        end
      end

      -- Planning segment
      local plan_seg = "plan-" .. tostring(round) .. "-" .. tostring(math.random(100000, 999999))
      context.emit("run.segment.start", {
        segment_id = plan_seg,
        kind = "search_planning",
        display = { mode = "visible", label = plan.interpretation or query }
      })
      context.emit("run.segment.end", { segment_id = plan_seg })

      -- 2. 并行搜索
      local search_seg = "search-" .. tostring(round) .. "-" .. tostring(math.random(100000, 999999))
      context.emit("run.segment.start", {
        segment_id = search_seg,
        kind = "search_queries",
        display = { mode = "visible", label = "Searching", queries = plan.queries }
      })

      local calls = {}
      for _, q in ipairs(plan.queries) do
        table.insert(calls, {
          name = "web_search",
          args = json.encode({ query = q, max_results = 5 })
        })
      end
      local results, errs = tools.call_parallel(calls)

      for i = 1, #results do
        if results[i] and results[i] ~= "" then
          local ok, parsed = pcall(json.decode, results[i])
          if ok and parsed and parsed.results then
            for _, s in ipairs(parsed.results) do
              table.insert(all_sources, s)
            end
          end
        end
      end
      context.emit("run.segment.end", { segment_id = search_seg })

      -- 3. 审阅来源
      local review_seg = "review-" .. tostring(round) .. "-" .. tostring(math.random(100000, 999999))
      context.emit("run.segment.start", {
        segment_id = review_seg,
        kind = "search_reviewing",
        display = { mode = "visible", label = "Reviewing " .. tostring(#all_sources) .. " sources" }
      })
      context.emit("run.segment.end", { segment_id = review_seg })

      -- 4. 多轮判断
      continue_search = false
      if round < max_rounds and #all_sources > 0 then
        local summary = "User query: " .. query .. "\nResults:\n"
        local limit = math.min(#all_sources, 10)
        for i = 1, limit do
          local s = all_sources[i]
          summary = summary .. "- " .. (s.title or "") .. ": " .. (s.snippet or "") .. "\n"
        end
        local raw_assess, _ = agent.generate(ASSESS_PROMPT, summary, { max_tokens = 256 })
        if raw_assess and raw_assess ~= "" then
          local ok, assessment = pcall(json.decode, raw_assess)
          if ok and assessment and assessment.sufficient == false and assessment.queries and #assessment.queries > 0 then
            continue_search = true
          end
        end
      end
    end

    -- 5. 生成回答
    local search_context = ""
    for i, s in ipairs(all_sources) do
      search_context = search_context .. "[web:" .. tostring(i) .. "] "
        .. (s.title or "") .. "\nURL: " .. (s.url or "") .. "\n"
        .. (s.snippet or "") .. "\n\n"
    end

    local enriched_system = system_prompt
    if search_context ~= "" then
      enriched_system = enriched_system .. "\n\n# Provided Search Results\n" .. search_context
    end

    agent.stream(enriched_system, messages, { max_tokens = 8192 })
